<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <main class="signup-page">
        <video class="signup-bg-video" autoplay muted loop playsinline>
            <source src="https://pixabay.com/videos/download/x-70796_medium.mp4" type="video/mp4">
        </video>
        <div class="signup-background-overlay"></div>

        <section class="signup-panel">
            <div class="signup-header">
                <h1>Forgot Password?</h1>
                <p>Enter your email and we’ll resend a password reset link to your inbox.</p>
            </div>

            <form class="signup-form" id="forgot-form">
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <div id="forgot-message" class="form-message"></div>

                <button class="button-primary" type="submit">Resend Password Link</button>
            </form>

            <p class="signup-note">
                Remembered your password? <a href="login.html">Back to login</a>
            </p>
        </section>
    </main>

    <script>
        const API_URL = 'http://localhost:5000/api/auth';

        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('forgot-message');
            messageDiv.textContent = '';

            const email = document.getElementById('email').value;

            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                messageDiv.style.color = 'green';
                messageDiv.textContent = 'Check your email for a password reset link!';
                document.getElementById('forgot-form').reset();
            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Error connecting to server';
                console.error('Forgot password error:', error);
            }
        });
    </script>
</body>
</html>
