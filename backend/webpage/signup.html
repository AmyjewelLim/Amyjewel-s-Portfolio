<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <main class="signup-page">
        <video class="signup-bg-video" autoplay muted loop playsinline>
            <source src="https://pixabay.com/videos/download/x-70796_medium.mp4" type="video/mp4">
        </video>
        <div class="signup-background-overlay"></div>

        <section class="signup-panel">
            <div class="signup-header">
                <h1>Create Your Account</h1>
                <p>Join now to start sharing your work and tracking your progress.</p>
            </div>

            <form class="signup-form" id="signup-form">
                <label for="full-name">Full Name</label>
                <input id="full-name" name="full-name" type="text" placeholder="Your name" required>

                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Create a password" required>

                <label for="confirm-password">Confirm Password</label>
                <input id="confirm-password" name="confirm-password" type="password" placeholder="Repeat your password" required>

                <label class="checkbox-label">
                    <input type="checkbox" name="terms" required>
                    I agree to the <a href="#">terms and conditions</a>
                </label>

                <div id="signup-message" class="form-message"></div>

                <button class="button-primary" type="submit">Sign Up</button>
            </form>

            <p class="signup-note">
                Already have an account? <a href="login.html">Log in</a>
            </p>
        </section>
    </main>

    <script>
        const API_URL = 'http://localhost:5000/api/auth';

        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('signup-message');
            messageDiv.textContent = '';

            const fullName = document.getElementById('full-name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, confirmPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    messageDiv.style.color = 'green';
                    messageDiv.textContent = 'Signup successful! Redirecting...';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    messageDiv.style.color = 'red';
                    messageDiv.textContent = data.error || 'Signup failed';
                }
            } catch (error) {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'Error connecting to server';
                console.error('Signup error:', error);
            }
        });
    </script>
</body>
</html>
